name: secret-scan

# Enforcement layer that survives `git commit --no-verify`: scans every push and PR.
on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install algosdk (checksum-validates Algorand mnemonics)
        run: pip install py-algorand-sdk
      - name: Scan tracked files for secrets
        run: python3 scripts/scan_secrets.py
